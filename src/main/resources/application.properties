spring.application.name=freewillase-backend
server.port=8081

# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/freewillase?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# MyBatis-Plus Configuration
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# Logging
logging.level.com.freewillase.backend=debug
logging.level.com.freewillase.backend.mapper=debug

# Circular Reference
spring.main.allow-circular-references=true

# App Specific
app.frontend-origin=http://localhost:5173
app.ncbi.base-url=https://eutils.ncbi.nlm.nih.gov/entrez/eutils
app.ncbi.tool=freewillase
app.uniprot.base-url=https://rest.uniprot.org

# JWT Configuration
app.jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e5f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8a9b0c1d}
app.jwt.expiration-ms=86400000
